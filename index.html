<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midjourney Review Progress Calendar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">AI-first Midjourney cockpit</p>
          <h1>Review calendar</h1>
          <p class="lede">Track images, videos, publishing, and any extras with a future-ready calendar.</p>
        </div>
        <div class="hero__actions">
          <button id="exportBtn" class="btn btn--ghost">Export JSON</button>
          <button id="importBtn" class="btn btn--primary">Import JSON</button>
          <input type="file" id="importInput" accept="application/json" class="hidden" />
        </div>
      </header>

      <section class="panel-grid">
        <section class="panel">
          <div class="panel__head">
            <div class="form-inline">
              <label for="jumpMonthInput">Month</label>
              <input type="month" id="jumpMonthInput" />
            </div>
            <div class="form-inline">
              <label for="jumpDateInput">Jump to date</label>
              <input type="date" id="jumpDateInput" />
            </div>
            <div class="nav-buttons">
              <button id="prevMonthBtn" class="btn btn--ghost" aria-label="Previous Month">◀</button>
              <button id="nextMonthBtn" class="btn btn--ghost" aria-label="Next Month">▶</button>
            </div>
          </div>

          <div class="calendar-header">
            <h2 id="monthYear"></h2>
            <div id="progressStats" class="status status--info">Loading…</div>
          </div>

          <div class="calendar-days"> <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span> </div>
          <section id="calendarGrid" class="calendar-grid" aria-label="Calendar Dates"></section>
          <div class="panel__footer">
            <button id="clearAllBtn" class="btn btn--outline">Clear All</button>
          </div>
        </section>

        <section class="panel">
          <div class="panel__head">
            <div>
              <p class="eyebrow">Selected day</p>
              <h3 id="selectedDateLabel"></h3>
              <p id="taskSummary" class="subtle"></p>
            </div>
            <div class="task-meter" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
          <div id="taskList" class="task-list" aria-live="polite"></div>
          <form id="addTaskForm" class="add-task" autocomplete="off">
            <input id="addTaskInput" type="text" placeholder="Add another task (e.g., Publish to Instagram)" />
            <button type="submit" class="btn btn--primary">Add</button>
          </form>
          <div class="preset-row">
            <p class="subtle">Task presets</p>
            <div id="presetsList" class="pill-row"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
